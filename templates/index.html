<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Registration for Biddathon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-users me-2"></i>Team Registration for Biddathon</a>
            <div class="navbar-nav ms-auto">
                <a href="{{ url_for('login') }}" class="btn btn-outline-primary"><i class="fas fa-lock me-1"></i>Admin Login</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body p-5">
                        <h1 class="text-center mb-4"><i class="fas fa-clipboard-list me-2"></i>Team Registration & Payment</h1>
                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                <div class="alert alert-success">
                                    <i class="fas fa-check-circle me-2"></i>{{ messages[0] }}
                                </div>
                            {% endif %}
                        {% endwith %}
                        <form action="{{ url_for('register') }}" method="post" enctype="multipart/form-data" class="row g-3">
                            <div class="col-12">
                                <label for="team_name" class="form-label"><i class="fas fa-tag me-1"></i>Team Name</label>
                                <input type="text" class="form-control" id="team_name" name="team_name" required>
                            </div>
                            <div class="col-md-6">
                                <label for="team_leader" class="form-label"><i class="fas fa-user-tie me-1"></i>Team Leader Name</label>
                                <input type="text" class="form-control" id="team_leader" name="team_leader" required>
                            </div>
                            <div class="col-md-6">
                                <label for="members" class="form-label"><i class="fas fa-users me-1"></i>Team Member Names</label>
                                <input type="text" class="form-control" id="members" name="members" placeholder="e.g., John, Jane, Bob" required>
                            </div>
                            <div class="col-12">
                                <label for="emails" class="form-label"><i class="fas fa-envelope me-1"></i>Email IDs</label>
                                <input type="text" class="form-control" id="emails" name="emails" placeholder="e.g., john@example.com, jane@example.com" required>
                            </div>
                            <div class="col-12">
                                <div class="payment-section text-center">
                                    <h3><i class="fas fa-qrcode me-2"></i>Payment Section</h3>
                                    <p class="mb-3">Pay ₹50 using this QR code:</p>
                                    <img src="{{ url_for('static', filename='qr.png') }}" alt="Payment QR Code" class="img-fluid mb-3" style="max-width: 200px;">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="utr" class="form-label"><i class="fas fa-hashtag me-1"></i>UTR Number</label>
                                <input type="text" class="form-control" id="utr" name="utr" required>
                            </div>
                            <div class="col-md-6">
                                <label for="screenshot" class="form-label"><i class="fas fa-upload me-1"></i>Upload Payment Screenshot</label>
                                <input type="file" class="form-control" id="screenshot" name="screenshot" accept="image/*" required>
                            </div>
                            <div>
                                <h4>Coordinator details - Sharath :6363207140</h4>
                            </div>
                            <div class="col-12 text-center">
                                <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-paper-plane me-2"></i>Submit Registration</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
