<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-tachometer-alt me-2"></i>Admin Dashboard</a>
            <div class="navbar-nav ms-auto">
                <a href="{{ url_for('logout') }}" class="btn btn-outline-danger"><i class="fas fa-sign-out-alt me-1"></i>Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card">
            <div class="card-body">
                <h1 class="text-center mb-4"><i class="fas fa-users-cog me-2"></i>Team Registrations</h1>
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th><i class="fas fa-hashtag me-1"></i>ID</th>
                                <th><i class="fas fa-tag me-1"></i>Team Name</th>
                                <th><i class="fas fa-user-tie me-1"></i>Team Leader</th>
                                <th><i class="fas fa-hashtag me-1"></i>UTR</th>
                                <th><i class="fas fa-clock me-1"></i>Time</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for reg in regs %}
                            <tr>
                                <td>{{ reg.id }}</td>
                                <td>{{ reg.team_name }}</td>
                                <td><a href="{{ url_for('team_detail', id=reg.id) }}" class="text-decoration-none"><i class="fas fa-eye me-1"></i>{{ reg.team_leader }}</a></td>
                                <td>{{ reg.utr }}</td>
                                <td>{{ reg.timestamp.strftime('%Y-%m-%d %H:%M') }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
